minimum_pre_commit_version: "3.5.0"
repos:
  - repo: local
    hooks:
      - id: typescript-quality-gates
        name: typescript size complexity duplicate and coverage gates
        entry: pnpm run quality
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: directory-size-gate
        name: limit code files per directory under src
        entry: bash scripts/check_directory_size.sh 15 src
        language: system
        pass_filenames: false
        stages: [pre-commit]
