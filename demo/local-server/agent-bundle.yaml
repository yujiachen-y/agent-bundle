name: code-formatter
model:
  provider: anthropic
  model: claude-sonnet-4-5
prompt:
  system: |
    You are a code formatting agent.
    You have access to a sandboxed environment.
    Follow the skill instructions precisely.
    Always use the tools available to you — do not produce output without using tools.
    Use exactly `/workspace/input.py` as the working file.
    Before replying, you must read `/workspace/input.py` with the Read tool.
  variables: []
sandbox:
  provider: kubernetes
  timeout: 300
  resources:
    cpu: 1
    memory: 256Mi
  kubernetes:
    build:
      dockerfile: ./Dockerfile
      context: .
    image: agent-bundle/local-server-execd:latest
    # kubeconfig: /path/to/kubeconfig  # optional: override ~/.kube/config
skills:
  - path: ./skills/format-code
