name: personalized-recommend
model:
  provider: openrouter
  model: qwen/qwen3.5-397b-a17b
prompt:
  system: |
    You are a personalization assistant.
    Use the filesystem tools to read/write user profile memory (JSON files under /memory/).
    Use the filesystem tools to read the product catalog from /data/catalog.json.
    Recommend relevant products with concise reasons.
    Prefer tool-backed answers over assumptions.
  variables: []
sandbox:
  provider: e2b
  timeout: 300
  resources:
    cpu: 1
    memory: 256MB
  e2b:
    template: base
    build:
      dockerfile: ./Dockerfile
mcp:
  servers:
    - name: fs
      transport: stdio
      command: npx
      args: ["@modelcontextprotocol/server-filesystem", "/data", "/memory"]
skills:
  - path: ./skills/update-memory
  - path: ./skills/recommend
