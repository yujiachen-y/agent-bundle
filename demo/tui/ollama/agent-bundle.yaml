name: coding-assistant-ollama
model:
  provider: ollama
  model: qwen2.5-coder
  ollama:
    baseUrl: http://localhost:11434
prompt:
  system: |
    You are a coding assistant agent.
    You have access to a sandboxed environment.
    Follow the skill instructions precisely.
    Always use the tools available to you — do not produce output without using tools.
    Use `/workspace` as the working directory.
  variables: []
sandbox:
  provider: e2b
  timeout: 300
  resources:
    cpu: 1
    memory: 256MB
  e2b:
    template: coding-assistant-ollama-demo
    build:
      dockerfile: ./Dockerfile
skills:
  - path: ./skills/code-assist
