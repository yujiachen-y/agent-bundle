[tool.pytest.ini_options]
addopts = "-q --cov=scripts.sync_docs_to_notion --cov-report=term-missing --cov-branch --cov-fail-under=80"
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["scripts", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 20

[tool.mypy]
python_version = "3.10"
files = ["scripts", "tests"]
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = ["pytest"]
ignore_missing_imports = true

[tool.bandit]
targets = ["scripts"]
exclude_dirs = ["tests"]
