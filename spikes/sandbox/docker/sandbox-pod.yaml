apiVersion: v1
kind: Pod
metadata:
  name: __POD_NAME__
  labels:
    app: agent-sandbox
    session-id: __SESSION_ID__
spec:
  restartPolicy: Never
  containers:
    - name: sandbox
      image: __IMAGE__
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 3000
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      readinessProbe:
        httpGet:
          path: /health
          port: 3000
        initialDelaySeconds: 1
        periodSeconds: 1
        timeoutSeconds: 1
        failureThreshold: 30
