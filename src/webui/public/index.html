<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agent-bundle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
</head>
<body>
  <!-- Background effects (matching site/index.html) -->
  <div class="mesh-bg"></div>
  <div class="noise"></div>

  <div id="app">
    <!-- Header -->
    <header id="header">
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle file tree">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="logo">agent<span class="logo-dot">&middot;</span>bundle</span>
    </header>

    <div id="panels">
      <!-- Left: File Panel -->
      <aside id="file-panel">
        <div class="panel-header">
          <span class="panel-title">Files</span>
          <button id="browse-mode-toggle" class="browse-mode-toggle" type="button" title="Toggle workspace / full sandbox">
            <span id="browse-mode-label" class="browse-mode-label">/workspace</span>
          </button>
        </div>
        <div id="sandbox-breadcrumb" class="sandbox-breadcrumb" style="display:none;"></div>
        <div id="file-tree" class="file-tree"></div>
      </aside>

      <!-- Center: Workspace (hero) -->
      <main id="workspace-panel">

        <!-- Tab bar -->
        <div class="workspace-tabs">
          <button class="workspace-tab workspace-tab--active" data-tab="workspace">Workspace</button>
          <button class="workspace-tab" data-tab="transcript">Transcript</button>
          <button class="workspace-tab" data-tab="metrics">Metrics</button>
        </div>

        <!-- Workspace content area -->
        <div id="workspace-content" class="workspace-content">
          <!-- Welcome State (shown when no file selected and no messages) -->
          <div id="welcome-state" class="welcome-state">
            <div class="welcome-icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
                <rect x="1" y="1" width="22" height="22" rx="3" ry="3" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.3"></rect>
              </svg>
            </div>
            <h2 class="welcome-title" id="welcome-agent-name"></h2>
            <p class="welcome-powered">powered by agent<span class="dot">&middot;</span>bundle</p>
            <p class="welcome-subtitle" id="welcome-subtitle"></p>
            <div id="skill-badges" class="skill-badges"></div>
            <div id="prompt-chips" class="prompt-chips"></div>
          </div>

          <!-- Empty state: no files yet -->
          <div id="empty-no-files" class="workspace-empty" style="display:none;">
            <div class="workspace-empty-card">
              <div class="workspace-empty-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                  <line x1="12" y1="18" x2="12" y2="12"></line>
                  <line x1="9" y1="15" x2="15" y2="15"></line>
                </svg>
              </div>
              <div class="workspace-empty-text">Files will appear here as the agent works.</div>
            </div>
          </div>

          <!-- Empty state: files exist, none selected -->
          <div id="empty-with-files" class="workspace-empty" style="display:none;align-items:stretch;justify-content:flex-start;">
            <div class="workspace-empty-header">Recently Generated</div>
            <div id="file-card-grid" class="file-card-grid">
              <!-- Cards injected by JS -->
            </div>
          </div>

          <!-- Preview content (shown when a file is selected) -->
          <div id="preview-area" class="preview-area" style="display:none;">
            <div class="preview-header">
              <div id="preview-breadcrumb" class="preview-breadcrumb">
                <span id="preview-filename" class="preview-breadcrumb-current">filename</span>
              </div>
              <button id="preview-close" class="preview-close" type="button" aria-label="Close preview">&times;</button>
            </div>
            <div id="preview-content" class="preview-content"></div>
          </div>

        </div>

        <!-- Metrics panel (hidden by default) -->
        <div id="metrics-panel" class="metrics-panel" style="display:none;">
          <div class="metrics-toolbar">
            <button id="metrics-refresh" class="transcript-btn" type="button" title="Refresh metrics">Refresh</button>
            <label class="metrics-auto-refresh">
              <input id="metrics-auto-refresh-toggle" type="checkbox"> Auto-refresh (5s)
            </label>
            <button id="metrics-reset" class="transcript-btn transcript-btn--danger" type="button" title="Reset metrics">Reset</button>
          </div>
          <div id="metrics-content" class="metrics-content"></div>
        </div>

        <!-- Transcript panel (hidden by default) -->
        <div id="transcript-panel" class="transcript-panel" style="display:none;">
          <div class="transcript-toolbar">
            <button id="transcript-refresh" class="transcript-btn" type="button" title="Refresh transcript">Refresh</button>
            <label class="transcript-auto-refresh">
              <input id="transcript-auto-refresh-toggle" type="checkbox"> Auto-refresh
            </label>
            <button id="transcript-copy" class="transcript-btn" type="button" title="Copy transcript JSON">Copy JSON</button>
            <button id="transcript-clear" class="transcript-btn transcript-btn--danger" type="button" title="Clear transcript events">Clear Events</button>
          </div>
          <div id="transcript-list" class="transcript-list"></div>
        </div>
      </main>

      <!-- Right: Chat Sidebar -->
      <aside id="chat-sidebar" class="chat-sidebar">
        <div class="chat-sidebar-header">
          <span class="chat-sidebar-title">Chat</span>
          <div class="chat-header-controls">
            <span id="status-badge" class="badge badge--idle">idle</span>
            <button
              id="clear-context-btn"
              class="clear-context-btn"
              type="button"
              aria-label="Clear context"
              title="Clear context"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0 0 20.49 15"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Chat Messages Area -->
        <div id="chat-messages" class="chat-messages">
          <!-- Messages injected by JS -->
        </div>

        <!-- Chat Input -->
        <form id="chat-form" class="chat-form">
          <div id="chat-attachments" class="chat-attachments"></div>
          <input type="file" id="chat-file-input" multiple style="display:none;">
          <div class="input-wrapper">
            <button type="button" id="attach-btn" class="attach-btn" aria-label="Attach files" title="Attach files">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.2a4 4 0 1 1 5.66 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.49-8.48"></path>
              </svg>
            </button>
            <textarea
              id="chat-input"
              class="chat-input"
              placeholder="Send a message..."
              rows="1"
              autocomplete="off"
              autofocus
            ></textarea>
            <button type="submit" id="send-btn" class="send-btn" aria-label="Send message">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
          <div class="input-hint">Enter to send &middot; Shift+Enter for newline</div>
        </form>
      </aside>
    </div>
  </div>

  <!-- Panel overlay (mobile backdrop) -->
  <div class="panel-overlay"></div>

  <!-- Image Modal -->
  <div id="image-modal" class="image-modal" style="display:none;" role="dialog" aria-modal="true" aria-label="Image preview">
    <img id="modal-image" src="" alt="Preview">
    <button id="modal-close" class="modal-close" type="button" aria-label="Close image preview">&times;</button>
  </div>

  <div id="clear-modal-overlay" class="clear-modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-label="Clear context confirmation">
    <div class="clear-modal">
      <div class="clear-modal-title">Clear chat context?</div>
      <div class="clear-modal-text">This will reset the conversation for this session.</div>
      <label class="clear-modal-checkbox">
        <input id="clear-workspace-checkbox" type="checkbox">
        <span>Also clear workspace files</span>
      </label>
      <div class="clear-modal-actions">
        <button id="clear-modal-cancel" type="button" class="clear-modal-btn">Cancel</button>
        <button id="clear-modal-confirm" type="button" class="clear-modal-btn clear-modal-btn--danger">Clear</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="/assets/app.js"></script>
  <script src="/assets/file-transfer.js"></script>
</body>
</html>
